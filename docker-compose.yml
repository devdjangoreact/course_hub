services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Optional PostgreSQL target. Enable with: docker compose --profile postgres up
  # and set DATABASE_URL=postgresql+asyncpg://course:course@db:5432/course_hub
  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: course
      POSTGRES_PASSWORD: course
      POSTGRES_DB: course_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
